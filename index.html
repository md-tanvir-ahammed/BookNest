<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BookNest - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>BookNest</h1>
            <p>Your community book review platform</p>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>
        
        <div class="form-section active" id="login-section">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" />
            </div>
            <div class="remember">
                <input type="checkbox" id="remember" />
                <label for="remember">Remember me</label>
            </div>
            <div class="forgot"><a href="#">Forgot password?</a></div>
            <button class="btn" onclick="handleLogin()">Login to BookNest</button>
            <div class="msg" id="login-msg"></div>
            <p class="switch-text">Don't have an account? <span onclick="switchTab('register')">Register here</span></p>
        </div>

        <div class="form-section" id="register-section">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Your full name" />
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min. 6 characters" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Repeat your password" />
            </div>
            <button class="btn" onclick="handleRegister()">Create Account</button>
            <div class="msg" id="register-msg"></div>
            <p class="switch-text">Already have an account? <span onclick="switchTab('login')">Login here</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
